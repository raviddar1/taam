<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>תורה שבמרחב</title>
  <style>
    @font-face {
      font-family: 'BuGlobal';
      src: url('גלובל/buGlobal1.0-Regular.otf') format('opentype');
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    html, body {
      width: 100%; height: 100%;
      background: #ffffff;
      font-family: 'BuGlobal', sans-serif;
      color: #000;
    }

    .navbar { position: fixed; top: 0; left: 0; right: 0; height: 64px; background: transparent; z-index: 100; }
    .nav-logo-sq { position: absolute; right: calc(35/1920*100vw); top: 50%; transform: translateY(-50%); width: 26px; height: 26px; background: #000; display: block; cursor: pointer; transition: opacity 0.4s; }
    .nav-logo-sq.hidden { opacity: 0; pointer-events: none; }
    .nav-link { font-family: 'BuGlobal', sans-serif; font-size: 14px; color: #000; text-decoration: none; white-space: nowrap; }
    .nav-link.active { color: #FF179C; -webkit-text-stroke: 0.5px currentColor; text-stroke: 0.5px currentColor; }
    #nav-center { position: absolute; left: 50%; top: 50%; transform: translate(-50%, -50%); display: flex; direction: rtl; gap: 80px; align-items: center; }
    .nav-info { position: absolute; right: calc(48/1920*100vw); top: 50%; transform: translateY(-50%); }
    #page-nav { display:flex; position:absolute; left: calc(35/1920*100vw); top:50%; transform:translateY(-50%); align-items:center; gap:2px; }
    .page-nav-btn { background:none; border:none; cursor:pointer; color:#e91e8c; font-size:18px; padding:2px 4px; line-height:1; cursor:pointer; }

    /* לוגו גדול מרכזי */
    #hero-logo {
      position: fixed;
      pointer-events: none;
      z-index: 50;
      transition: top .55s cubic-bezier(.4,0,.2,1),
                  left .55s cubic-bezier(.4,0,.2,1),
                  width .55s cubic-bezier(.4,0,.2,1),
                  height .55s cubic-bezier(.4,0,.2,1),
                  opacity .3s;
    }
    body.dark { background: #131111; }
    body.dark .nav-link:not(.active) { color: #fff; }
    body.dark .nav-logo-sq { background: #fff; }
    #hero-logo { background: #000; }
    body.dark #hero-logo { background: #fff; }
  </style>
</head>
<body>
  <script>location.replace('אודות.html');</script>

  <nav class="navbar">
    <a class="nav-logo-sq" href="index.html" id="nav-logo-sq"></a>
    <div id="nav-center">
      <a href="טעמים.html" class="nav-link nav-taamim">טעמים</a>
      <a href="פסוקים.html" class="nav-link nav-psukkim">פסוקים</a>
      <a href="טעמים.html?seq" class="nav-link nav-rzf">נגינה</a>
      <a href="ספריה.html" class="nav-link nav-spria">גלריה</a>
    </div>
    <a href="אודות.html" class="nav-link nav-info">אודות</a>
    <div id="page-nav">
      <button class="page-nav-btn" id="pnav-next"><svg width="9" height="15" viewBox="0 0 9 15" fill="none"><polyline points="1.5,1.5 7.5,7.5 1.5,13.5" stroke="currentColor" stroke-width="2.5" stroke-linecap="square" stroke-linejoin="miter"/></svg></button>
      <button class="page-nav-btn" id="pnav-prev"><svg width="9" height="15" viewBox="0 0 9 15" fill="none"><polyline points="7.5,1.5 1.5,7.5 7.5,13.5" stroke="currentColor" stroke-width="2.5" stroke-linecap="square" stroke-linejoin="miter"/></svg></button>
    </div>
  </nav>

  <div id="hero-logo"></div>

  <script>
  // ---- אנימציית לוגו מרכזי ----
  const hero    = document.getElementById('hero-logo');
  const navSq   = document.getElementById('nav-logo-sq');
  let heroAtCenter = false;

  function flyHeroToCenter() {
    const nr = navSq.getBoundingClientRect();
    if (!nr.width || !nr.height) return;
    const TARGET_H = window.innerHeight * 0.22;
    const scale = TARGET_H / nr.height;
    const tw = nr.width * scale, th = nr.height * scale;
    Object.assign(hero.style, { transition:'none', top:nr.top+'px', left:nr.left+'px', width:nr.width+'px', height:nr.height+'px', opacity:'1' });
    navSq.classList.add('hidden');
    hero.offsetHeight;
    hero.style.transition = 'top .55s cubic-bezier(.4,0,.2,1), left .55s cubic-bezier(.4,0,.2,1), width .55s cubic-bezier(.4,0,.2,1), height .55s cubic-bezier(.4,0,.2,1)';
    hero.style.top  = (window.innerHeight/2 - th/2) + 'px';
    hero.style.left = (window.innerWidth/2  - tw/2) + 'px';
    hero.style.width = tw+'px'; hero.style.height = th+'px';
    heroAtCenter = true;
  }

  function returnHeroToNav(cb) {
    if (!heroAtCenter) { if (cb) cb(); return; }
    const nr = navSq.getBoundingClientRect();
    hero.style.transition = 'top .4s cubic-bezier(.4,0,.2,1), left .4s cubic-bezier(.4,0,.2,1), width .4s cubic-bezier(.4,0,.2,1), height .4s cubic-bezier(.4,0,.2,1)';
    hero.style.top=nr.top+'px'; hero.style.left=nr.left+'px';
    hero.style.width=nr.width+'px'; hero.style.height=nr.height+'px';
    heroAtCenter = false;
    setTimeout(() => { navSq.classList.remove('hidden'); hero.style.opacity='0'; if(cb) cb(); }, 420);
  }

  hero.style.opacity = '0';
  window.addEventListener('load', flyHeroToCenter);

  navSq.addEventListener('click', function(e) {
    e.preventDefault();
    if (!heroAtCenter) flyHeroToCenter();
  });

  const _iNAV = ['ספריה.html','טעמים.html?seq','פסוקים.html','טעמים.html','אודות.html'];
  document.getElementById('pnav-next').addEventListener('click', function(){ window.location.href = _iNAV[_iNAV.length - 1]; });
  document.getElementById('pnav-prev').addEventListener('click', function(){ window.location.href = _iNAV[0]; });

  document.querySelectorAll('.nav-link').forEach(btn => {
    btn.addEventListener('click', function(e) {
      e.preventDefault();
      const href = this.href;
      returnHeroToNav(() => { window.location = href; });
    });
  });

  // ---- MIDI dark mode ----
  if(navigator.requestMIDIAccess){
    const _LS = localStorage;
    const _kR  = _LS.getItem('m_kR') !== null ? +_LS.getItem('m_kR') : null;
    const _nR  = _LS.getItem('m_nR') !== null ? +_LS.getItem('m_nR') : null;
    const _nRt = _LS.getItem('m_nRt') || null;
    const _nL  = _LS.getItem('m_nL') !== null ? +_LS.getItem('m_nL') : null;
    const _nLt = _LS.getItem('m_nLt') || null;
    function _setDark(on){ document.body.classList.toggle('dark',on); sessionStorage.setItem('darkMode',on?'1':'0'); }
    function onMidiMsg(msg){
      const [st,note,vel]=msg.data;
      if((st&0xF0)===0xB0){
        const val=vel/127;
        if(_kR!==null && note===_kR){ _setDark(val>0); return; }
        if(note===_nR&&_nRt==='cc'){ if(val>0.5) window.location.href=_iNAV[_iNAV.length-1]; return; }
        if(note===_nL&&_nLt==='cc'){ if(val>0.5) window.location.href=_iNAV[0]; return; }
      }
      if((st&0xF0)===0x90&&vel>0){
        if(note===_nR&&_nRt==='note'){ window.location.href=_iNAV[_iNAV.length-1]; return; }
        if(note===_nL&&_nLt==='note'){ window.location.href=_iNAV[0]; return; }
      }
    }
    navigator.requestMIDIAccess({sysex:false}).then(function(midi){
      midi.inputs.forEach(function(inp){
        inp.open().then(function(){ inp.onmidimessage=onMidiMsg; }).catch(function(){ inp.onmidimessage=onMidiMsg; });
      });
      midi.onstatechange=function(e){
        if(e.port.type==='input'&&e.port.state==='connected'){
          e.port.open().then(function(){ e.port.onmidimessage=onMidiMsg; }).catch(function(){ e.port.onmidimessage=onMidiMsg; });
        }
      };
    }).catch(function(){});
  }
  </script>
</body>
</html>
